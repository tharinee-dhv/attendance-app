<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบการลงเวลา</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }
        
        .header {
            background: white;
            padding: 20px 16px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .header h1 {
            font-size: 20px;
            margin-bottom: 4px;
        }
        
        .header p {
            font-size: 13px;
            color: #666;
        }
        
        .tabs {
            display: flex;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #999;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        
        .tab-btn.active {
            color: #333;
            border-bottom-color: #333;
        }
        
        .tab-content {
            display: none;
            padding: 20px 16px;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .section {
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        
        select, input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 16px;
            font-family: inherit;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #333;
        }
        
        .buttons {
            display: flex;
            gap: 12px;
        }
        
        button {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            background: #f5f5f5;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        button:hover {
            background: #eee;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .btn-success {
            background: #d4edda;
            color: #155724;
            border-color: #c3e6cb;
        }
        
        .btn-success:hover {
            background: #c3e6cb;
        }
        
        .btn-danger {
            background: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
        }
        
        .btn-danger:hover {
            background: #f5c6cb;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }
        
        .stat-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }
        
        .record-item {
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .record-time {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }
        
        .record-value {
            font-size: 13px;
            color: #333;
            font-weight: 500;
        }
        
        .employee-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            margin-bottom: 12px;
        }
        
        .employee-name {
            font-size: 14px;
            font-weight: 500;
        }
        
        .btn-delete {
            padding: 6px 12px;
            font-size: 12px;
            background: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
        }
        
        .btn-delete:hover {
            background: #f5c6cb;
        }
        
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .input-group input {
            flex: 1;
            margin-bottom: 0;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            background: #d1ecf1;
            color: #0c5460;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            margin-top: 8px;
        }
        
        .center-text {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .center-text p {
            margin-bottom: 8px;
        }
        
        .center-text .emp-name {
            font-size: 20px;
            font-weight: 600;
        }
        
        .empty-msg {
            color: #999;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ระบบการลงเวลา</h1>
            <p>บันทึกและติดตามเวลาการเข้า-ออกทำงาน</p>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('clockin')">
                <i class="fas fa-clock"></i> ลงเวลา
            </button>
            <button class="tab-btn" onclick="switchTab('records')">
                <i class="fas fa-list"></i> บันทึก
            </button>
            <button class="tab-btn" onclick="switchTab('stats')">
                <i class="fas fa-chart-bar"></i> สถิติ
            </button>
            <button class="tab-btn" onclick="switchTab('employees')">
                <i class="fas fa-users"></i> พนักงาน
            </button>
        </div>
        
        <!-- Tab: ลงเวลา -->
        <div id="clockin" class="tab-content active">
            <div class="section">
                <div class="section-title">เลือกพนักงาน</div>
                <select id="empSelect1" onchange="updateClockInView()">
                    <option value="">-- เลือกพนักงาน --</option>
                </select>
            </div>
            
            <div id="clockinView"></div>
        </div>
        
        <!-- Tab: บันทึก -->
        <div id="records" class="tab-content">
            <div class="section">
                <div class="section-title">เลือกพนักงาน</div>
                <select id="empSelect2" onchange="updateRecordsView()">
                    <option value="">-- เลือกพนักงาน --</option>
                </select>
            </div>
            
            <div id="recordsView"></div>
        </div>
        
        <!-- Tab: สถิติ -->
        <div id="stats" class="tab-content">
            <div class="section">
                <div class="section-title">เลือกพนักงาน</div>
                <select id="empSelect3" onchange="updateStatsView()">
                    <option value="">-- เลือกพนักงาน --</option>
                </select>
            </div>
            
            <div id="statsView"></div>
        </div>
        
        <!-- Tab: พนักงาน -->
        <div id="employees" class="tab-content">
            <button id="btnAddEmp" class="btn-primary" onclick="toggleAddEmployee()" style="width: 100%; margin-bottom: 16px;">
                <i class="fas fa-plus"></i> เพิ่มพนักงาน
            </button>
            
            <div id="addEmpForm" style="display: none; margin-bottom: 16px;">
                <div class="input-group">
                    <input type="text" id="newEmpName" placeholder="ชื่อพนักงาน">
                </div>
                <div class="buttons">
                    <button onclick="addEmployee()">บันทึก</button>
                    <button onclick="toggleAddEmployee()">ยกเลิก</button>
                </div>
            </div>
            
            <div class="section">
                <div class="section-title" id="empCountLabel">รายชื่อพนักงาน (0)</div>
                <div id="empList"></div>
            </div>
        </div>
    </div>
    
    <script>
        // Data management
        let employees = JSON.parse(localStorage.getItem('employees') || '[]');
        let records = JSON.parse(localStorage.getItem('records') || '[]');
        
        // Save to localStorage
        function saveData() {
            localStorage.setItem('employees', JSON.stringify(employees));
            localStorage.setItem('records', JSON.stringify(records));
        }
        
        // Tab switching
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            
            if (tabName === 'employees') updateEmployeesList();
            if (tabName === 'records') updateRecordsView();
            if (tabName === 'stats') updateStatsView();
            if (tabName === 'clockin') updateClockInView();
        }
        
        // Update select dropdowns
        function updateSelects() {
            [1, 2, 3].forEach(n => {
                const select = document.getElementById(`empSelect${n}`);
                const currentVal = select.value;
                select.innerHTML = '<option value="">-- เลือกพนักงาน --</option>';
                employees.forEach(emp => {
                    const opt = document.createElement('option');
                    opt.value = emp.id;
                    opt.textContent = emp.name;
                    select.appendChild(opt);
                });
                select.value = currentVal;
            });
        }
        
        // Clock In / Out
        function updateClockInView() {
            const empId = document.getElementById('empSelect1').value;
            const view = document.getElementById('clockinView');
            
            if (!empId) {
                view.innerHTML = '<p class="empty-msg">ยังไม่มีพนักงาน เพิ่มพนักงานใหม่</p>';
                return;
            }
            
            const emp = employees.find(e => e.id === empId);
            const empRecords = records.filter(r => r.employeeId === empId);
            const lastRecord = empRecords[empRecords.length - 1];
            const isCheckedIn = lastRecord && !lastRecord.checkOut;
            
            let html = `
                <div class="section">
                    <div class="center-text">
                        <p style="font-size: 14px; color: #999;">พนักงาน</p>
                        <p class="emp-name">${emp.name}</p>
                        ${isCheckedIn ? '<div class="status-badge">กำลังทำงาน</div>' : ''}
                    </div>
                    
                    <div class="buttons">
                        <button class="btn-success" onclick="checkIn('${empId}')" ${isCheckedIn ? 'disabled' : ''}>
                            <i class="fas fa-sign-in-alt"></i> เข้า
                        </button>
                        <button class="btn-danger" onclick="checkOut('${empId}')" ${!isCheckedIn ? 'disabled' : ''}>
                            <i class="fas fa-sign-out-alt"></i> ออก
                        </button>
                    </div>
            `;
            
            if (lastRecord) {
                html += `
                    <div style="margin-top: 20px;">
                        <div class="section-title">ล่าสุด</div>
                        <div class="record-item">
                            <div>
                                <div class="record-time">เข้า</div>
                                <div class="record-value">${formatTime(lastRecord.checkIn)}</div>
                            </div>
                            <div>
                                <div class="record-time">ออก</div>
                                <div class="record-value">${lastRecord.checkOut ? formatTime(lastRecord.checkOut) : '-'}</div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            html += '</div>';
            view.innerHTML = html;
        }
        
        function checkIn(empId) {
            const lastRecord = records.filter(r => r.employeeId === empId).pop();
            if (lastRecord && !lastRecord.checkOut) {
                alert('พนักงานนี้ยังไม่ได้ออก');
                return;
            }
            
            records.push({
                id: Date.now().toString(),
                employeeId: empId,
                checkIn: new Date().toISOString(),
                checkOut: null
            });
            saveData();
            updateClockInView();
        }
        
        function checkOut(empId) {
            const lastRecord = records.filter(r => r.employeeId === empId).pop();
            if (!lastRecord || lastRecord.checkOut) {
                alert('กรุณากดเข้ากอนออก');
                return;
            }
            
            lastRecord.checkOut = new Date().toISOString();
            saveData();
            updateClockInView();
        }
        
        // Records view
        function updateRecordsView() {
            const empId = document.getElementById('empSelect2').value;
            const view = document.getElementById('recordsView');
            
            if (!empId) {
                view.innerHTML = '<p class="empty-msg">เลือกพนักงาน</p>';
                return;
            }
            
            const empRecords = records.filter(r => r.employeeId === empId);
            
            if (empRecords.length === 0) {
                view.innerHTML = `
                    <div class="section">
                        <div class="section-title">บันทึกการลงเวลา (0)</div>
                        <p class="empty-msg">ไม่มีบันทึก</p>
                    </div>
                `;
                return;
            }
            
            let html = `<div class="section"><div class="section-title">บันทึกการลงเวลา (${empRecords.length})</div>`;
            
            empRecords.forEach(record => {
                const hours = calculateHours(record.checkIn, record.checkOut);
                html += `
                    <div class="record-item">
                        <div>
                            <div class="record-time">เข้า</div>
                            <div class="record-value">${formatTime(record.checkIn)}</div>
                        </div>
                        <div>
                            <div class="record-time">ออก</div>
                            <div class="record-value">${record.checkOut ? formatTime(record.checkOut) : '-'}</div>
                        </div>
                        ${record.checkOut ? `
                        <div style="grid-column: 1 / -1; border-top: 1px solid #e0e0e0; padding-top: 8px; margin-top: 8px;">
                            <div class="record-time">เวลาทำงาน</div>
                            <div class="record-value">${hours} ชั่วโมง</div>
                        </div>
                        ` : ''}
                    </div>
                `;
            });
            
            html += '</div>';
            view.innerHTML = html;
        }
        
        // Stats view
        function updateStatsView() {
            const empId = document.getElementById('empSelect3').value;
            const view = document.getElementById('statsView');
            
            if (!empId) {
                view.innerHTML = '<p class="empty-msg">เลือกพนักงาน</p>';
                return;
            }
            
            const empRecords = records.filter(r => r.employeeId === empId && r.checkOut);
            const totalHours = empRecords.reduce((sum, r) => sum + parseFloat(calculateHours(r.checkIn, r.checkOut)), 0);
            const totalDays = empRecords.length;
            
            let html = `
                <div class="section">
                    <div class="section-title">สรุป</div>
                    <div class="stats">
                        <div class="stat-card">
                            <div class="stat-label">จำนวนวัน</div>
                            <div class="stat-value">${totalDays}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">ชั่วโมงทั้งหมด</div>
                            <div class="stat-value">${Math.round(totalHours * 100) / 100}</div>
                        </div>
                    </div>
                    
                    <div class="section-title">รายละเอียดทั้งหมด</div>
            `;
            
            if (empRecords.length === 0) {
                html += '<p class="empty-msg">ไม่มีข้อมูล</p>';
            } else {
                empRecords.forEach(record => {
                    const date = new Date(record.checkIn).toLocaleDateString('th-TH');
                    const hours = calculateHours(record.checkIn, record.checkOut);
                    html += `
                        <div class="record-item">
                            <div>
                                <div class="record-time">วัน</div>
                                <div class="record-value">${date}</div>
                            </div>
                            <div>
                                <div class="record-time">ชั่วโมง</div>
                                <div class="record-value">${hours}</div>
                            </div>
                        </div>
                    `;
                });
            }
            
            html += '</div>';
            view.innerHTML = html;
        }
        
        // Employees management
        function toggleAddEmployee() {
            const form = document.getElementById('addEmpForm');
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
            if (form.style.display === 'block') {
                document.getElementById('newEmpName').focus();
            }
        }
        
        function addEmployee() {
            const name = document.getElementById('newEmpName').value.trim();
            if (!name) return;
            
            employees.push({
                id: Date.now().toString(),
                name: name,
                createdAt: new Date().toISOString()
            });
            
            saveData();
            document.getElementById('newEmpName').value = '';
            document.getElementById('addEmpForm').style.display = 'none';
            updateSelects();
            updateEmployeesList();
        }
        
        function deleteEmployee(empId) {
            if (confirm('ต้องการลบพนักงานนี้?')) {
                employees = employees.filter(e => e.id !== empId);
                records = records.filter(r => r.employeeId !== empId);
                saveData();
                updateSelects();
                updateEmployeesList();
            }
        }
        
        function updateEmployeesList() {
            const list = document.getElementById('empList');
            const countLabel = document.getElementById('empCountLabel');
            
            countLabel.textContent = `รายชื่อพนักงาน (${employees.length})`;
            
            if (employees.length === 0) {
                list.innerHTML = '<p class="empty-msg">ยังไม่มีพนักงาน</p>';
                return;
            }
            
            let html = '';
            employees.forEach(emp => {
                html += `
                    <div class="employee-item">
                        <div class="employee-name">${emp.name}</div>
                        <button class="btn-delete" onclick="deleteEmployee('${emp.id}')">ลบ</button>
                    </div>
                `;
            });
            
            list.innerHTML = html;
        }
        
        // Utilities
        function formatTime(isoString) {
            if (!isoString) return '-';
            const date = new Date(isoString);
            return date.toLocaleString('th-TH', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });
        }
        
        function calculateHours(checkIn, checkOut) {
            if (!checkIn || !checkOut) return 0;
            const diff = new Date(checkOut) - new Date(checkIn);
            return (diff / (1000 * 60 * 60)).toFixed(2);
        }
        
        // Initialize
        function init() {
            updateSelects();
            updateEmployeesList();
        }
        
        document.getElementById('newEmpName').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addEmployee();
        });
        
        init();
    </script>
</body>
</html>
