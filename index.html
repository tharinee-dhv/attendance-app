<!DOCTYPE html>
<html lang="th
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกเวลาทำงาน (GPS Check-in Pro)</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen p-4 flex flex-col items-center justify-start">

    <div class="w-full max-w-xl bg-white rounded-2xl shadow-xl p-6 mt-4 border border-slate-100">
        <h1 class="text-2xl font-bold text-center text-indigo-600 mb-6 flex items-center justify-center gap-2">
            ⏰ Time Attendance System
        </h1>
        
        <!-- ส่วนที่ 1: เลือกผู้ใช้งาน -->
        <div class="mb-6 bg-slate-100 p-3 rounded-xl">
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">เข้าสู่ระบบโดย</label>
            <select id="userSelect" onchange="switchUser()" class="w-full bg-white border border-slate-300 text-slate-900 text-sm rounded-lg p-3 font-medium focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                <option value="" disabled selected>-- กรุณาเลือกชื่อของคุณ --</option>
                <option value="nut">A: นัท</option>
                <option value="bee">B: บี</option>
                <option value="joy">C: จอย</option>
                <option value="mild">D: มาย</option>
                <option value="admin">🔑 ผู้ดูแลระบบ (Admin)</option>
            </select>
        </div>

        <!-- ส่วนที่ 2: หน้าจอสำหรับพนักงาน (Clock In/Out) -->
        <div id="employeeZone" class="hidden space-y-4">
            <div class="p-4 bg-indigo-50 rounded-xl text-center border border-indigo-100">
                <p class="text-xs text-indigo-500 font-semibold uppercase tracking-wider">พิกัดเป้าหมายของคุณ</p>
                <p id="targetCoords" class="text-sm font-mono font-bold text-indigo-700 mt-1">-</p>
            </div>

            <div class="flex gap-4">
                <button onclick="processCheck('Clock In')" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 px-4 rounded-xl shadow-md shadow-emerald-100 transition-all active:scale-95">
                    📥 Clock In
                </button>
                <button onclick="processCheck('Clock Out')" class="flex-1 bg-rose-500 hover:bg-rose-600 text-white font-bold py-4 px-4 rounded-xl shadow-md shadow-rose-100 transition-all active:scale-95">
                    📤 Clock Out
                </button>
            </div>

            <!-- กล่องแสดงสถานะ GPS -->
            <div id="statusBox" class="text-sm p-3 rounded-lg border text-center hidden"></div>

            <!-- ตารางประวัติของพนักงาน (เห็นเฉพาะของตัวเองและของวันนี้เท่านั้น) -->
            <div class="mt-6 border-t pt-4">
                <h3 class="text-sm font-bold text-slate-700 mb-2 flex items-center gap-1">⏱️ ประวัติการลงเวลาของคุณวันนี้</h3>
                <div class="bg-slate-50 rounded-xl p-3 text-xs text-slate-600 space-y-2" id="empTodayLogs">
                    <!-- ประวัติจะแสดงที่นี่ -->
                </div>
            </div>
        </div>

        <!-- ส่วนที่ 3: หน้าจอสำหรับ Admin (สถิติรายเดือน/รายบุคคล) -->
        <div id="adminZone" class="hidden space-y-4 w-full">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 border-b pb-3">
                <h2 class="text-lg font-bold text-slate-800">📊 ตัวกรองรายงานสถิติ</h2>
                <button onclick="clearLogs()" class="text-xs bg-red-50 hover:bg-red-100 text-red-600 px-3 py-1.5 rounded-md font-medium">ล้างข้อมูลทั้งหมด</button>
            </div>
            
            <!-- ตัวเลือกกรองสำหรับ Admin -->
            <div class="grid grid-cols-2 gap-3 bg-slate-50 p-3 rounded-xl border">
                <div>
                    <label class="block text-xs text-slate-500 mb-1 font-medium">เลือกพนักงาน</label>
                    <select id="adminFilterUser" onchange="renderAdminStats()" class="w-full bg-white border border-slate-200 text-xs rounded-md p-2">
                        <option value="all">ทุกคน</option>
                        <option value="นัท">นัท</option>
                        <option value="บี">บี</option>
                        <option value="จอย">จอย</option>
                        <option value="มาย">มาย</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-slate-500 mb-1 font-medium">เลือกเดือน/ปี</label>
                    <input type="month" id="adminFilterMonth" onchange="renderAdminStats()" class="w-full bg-white border border-slate-200 text-xs rounded-md p-2">
                </div>
            </div>

            <!-- การ์ดสรุปชั่วโมงรวมประจำเดือน -->
            <div class="bg-indigo-600 text-white p-4 rounded-xl flex justify-between items-center shadow-lg shadow-indigo-100">
                <div>
                    <p class="text-xs opacity-80 uppercase tracking-wider font-semibold">สรุปเวลาทำงานของเงื่อนไขที่เลือก</p>
                    <p id="adminTotalHours" class="text-2xl font-bold mt-1">0.0 ชั่วโมง</p>
                </div>
                <span class="text-3xl">💼</span>
            </div>
            
            <!-- ตารางแสดงรายงานของ Admin -->
            <div class="overflow-x-auto border rounded-xl shadow-sm">
                <table class="w-full text-xs text-left text-slate-500 bg-white">
                    <thead class="text-slate-700 uppercase bg-slate-50 border-b">
                        <tr>
                            <th class="py-3 px-3">วัน/เดือน/ปี</th>
                            <th class="py-3 px-3">ชื่อ</th>
                            <th class="py-3 px-3">ประเภท</th>
                            <th class="py-3 px-3">เวลา</th>
                            <th class="py-3 px-3">ระยะห่าง</th>
                        </tr>
                    </thead>
                    <tbody id="adminLogTableBody">
                        <!-- ข้อมูลจะถูกเติมด้วย JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // 1. ตั้งค่าพิกัดพนักงานตามโจทย์
        const usersConfig = {
            nut: { name: "นัท", lat: 13.742930940465662, lng: 100.57758168932462 },
            bee: { name: "บี", lat: 13.742930940465662, lng: 100.57758168932462 },
            joy: { name: "จอย", lat: 13.748638810033686, lng: 100.63870881219955 },
            mild: { name: "มาย", lat: 13.748638810033686, lng: 100.63870881219955 }
        };

        // ตั้งค่าเริ่มต้นของตัวเลือกเดือนในหน้า Admin ให้เป็นเดือนปัจจุบัน
        window.onload = function() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            document.getElementById('adminFilterMonth').value = `${year}-${month}`;
        };

        // สลับหน้าจอผู้ใช้
        function switchUser() {
            const selected = document.getElementById('userSelect').value;
            const empZone = document.getElementById('employeeZone');
            const admZone = document.getElementById('adminZone');
            document.getElementById('statusBox').classList.add('hidden');

            if (selected === 'admin') {
                empZone.classList.add('hidden');
                admZone.classList.remove('hidden');
                renderAdminStats();
            } else if (selected) {
                admZone.classList.add('hidden');
                empZone.classList.remove('hidden');
                const user = usersConfig[selected];
                document.getElementById('targetCoords').innerText = `${user.lat.toFixed(5)}, ${user.lng.toFixed(5)}`;
                renderEmployeeTodayLogs(user.name);
            }
        }

        // ระบบดึง GPS และประมวลผลเช็กอิน/เอาต์
        function processCheck(type) {
            const selectedKey = document.getElementById('userSelect').value;
            const user = usersConfig[selectedKey];
            const statusBox = document.getElementById('statusBox');

            statusBox.className = "text-sm p-3 rounded-lg border text-center bg-blue-50 border-blue-200 text-blue-700 block";
            statusBox.innerText = "⏳ กำลังดึงพิกัด GPS เพื่อตรวจสอบ...";

            if (!navigator.geolocation) {
                showStatus("❌ บราวเซอร์ไม่รองรับระบบระบุตำแหน่ง", "error");
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const currentLat = position.coords.latitude;
                    const currentLng = position.coords.longitude;
                    const distance = getDistance(currentLat, currentLng, user.lat, user.lng);

                    // รัศมีกำหนดไม่เกิน 100 เมตร
                    if (distance <= 100) {
                        saveLog(user.name, type, distance);
                        showStatus(`✅ บันทึก ${type} สำเร็จ! (ระยะห่าง ${Math.round(distance)} เมตร)`, "success");
                        renderEmployeeTodayLogs(user.name);
                    } else {
                        showStatus(`❌ ${type} ล้มเหลว! คุณอยู่นอกพื้นที่ (ห่าง ${Math.round(distance)} เมตร / กำหนดไม่เกิน 100 ม.)`, "error");
                    }
                },
                (error) => {
                    showStatus("❌ ไม่สามารถเข้าถึง GPS ได้ กรุณาเปิด Location บนอุปกรณ์ของคุณ", "error");
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        // คำนวณระยะห่างทางคณิตศาสตร์ (เมตร)
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const phi1 = lat1 * Math.PI / 180;
            const phi2 = lat2 * Math.PI / 180;
            const deltaPhi = (lat2 - lat1) * Math.PI / 180;
            const deltaLambda = (lon2 - lon1) * Math.PI / 180;
Use code with caution.const a = Math.sin(deltaPhi / 2) * Math.sin(deltaPhi / 2) +Math.cos(phi1) * Math.cos(phi2) *Math.sin(deltaLambda / 2) * Math.sin(deltaLambda / 2);return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));}function showStatus(msg, status) {const statusBox = document.getElementById('statusBox');statusBox.innerText = msg;statusBox.className = status === 'success'? "text-sm p-3 rounded-lg border text-center bg-emerald-50 border-emerald-200 text-emerald-700 block animate-pulse": "text-sm p-3 rounded-lg border text-center bg-rose-50 border-rose-200 text-rose-700 block";}// บันทึก Log ลง LocalStorage พร้อมเก็บโครงสร้างเวลาที่แน่นอนเพื่อนำไปคำนวณชั่วโมงทำงานfunction saveLog(name, type, distance) {let logs = JSON.parse(localStorage.getItem('attendance_logs_v2')) || [];const now = new Date();// แยกข้อมูล วัน เดือน ปี เวลา เพื่อใช้กรองconst dateStr = now.toLocaleDateString('th-TH', { year: 'numeric', month: '2-digit', day: '2-digit' }); // "ดด/วว/ปปปป"const timeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });const isoString = now.toISOString(); // เก็บดิบสำหรับคำนวณชั่วโมงlogs.unshift({ name, type, dateStr, timeStr, isoString, distance: Math.round(distance) });localStorage.setItem('attendance_logs_v2', JSON.stringify(logs));}// [เงื่อนไขใหม่] หน้าพนักงาน: แสดงเฉพาะประวัติของตนเองและต้องเป็น "ของวันนี้" เท่านั้นfunction renderEmployeeTodayLogs(empName) {const logs = JSON.parse(localStorage.getItem('attendance_logs_v2')) || [];const container = document.getElementById('empTodayLogs');container.innerHTML = '';const todayStr = new Date().toLocaleDateString('th-TH', { year: 'numeric', month: '2-digit', day: '2-digit' });// กรอง: เอาเฉพาะชื่อตรงกัน และ วันที่ต้องเป็นวันนี้const myLogsToday = logs.filter(log => log.name === empName && log.dateStr === todayStr);if (myLogsToday.length === 0) {container.innerHTML = <p class="text-center py-2 text-slate-400 italic">ไม่มีข้อมูลการลงเวลาของวันนี้</p>;return;}myLogsToday.forEach(log => {const div = document.createElement('div');div.className = "flex justify-between items-center bg-white p-2.5 rounded-lg border border-slate-100 shadow-sm";const badgeColor = log.type === 'Clock In' ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700';div.innerHTML = <span class="px-2 py-0.5 rounded text-[10px] font-bold ${badgeColor}">${log.type}</span> <span class="font-mono text-slate-700 font-semibold">${log.timeStr} น.</span> <span class="text-slate-400 text-[10px]">(ห่างจุดตั้งต้น ${log.distance} ม.)</span>;container.appendChild(div);});}// [เงื่อนไขใหม่] หน้า Admin: แสดงรายงานคัดแยกตามบุคคล, เดือน และ สรุปชั่วโมงทั้งหมด/เดือนfunction renderAdminStats() {const logs = JSON.parse(localStorage.getItem('attendance_logs_v2')) || [];const filterUser = document.getElementById('adminFilterUser').value;const filterMonth = document.getElementById('adminFilterMonth').value; // "YYYY-MM"const tbody = document.getElementById('adminLogTableBody');tbody.innerHTML = '';if (!filterMonth) return;const [fYear, fMonth] = filterMonth.split('-');// 1. กรองข้อมูลตามที่แอดมินเลือกก่อนconst filteredLogs = logs.filter(log => {const logDate = new Date(log.isoString);const logYear = logDate.getFullYear();const logMonth = String(logDate.getMonth() + 1).padStart(2, '0');const matchUser = (filterUser === 'all' || log.name === filterUser);const matchMonth = (${logYear}-${logMonth} === ${fYear}-${fMonth});return matchUser && matchMonth;});// 2. แสดงผลในตารางif (filteredLogs.length === 0) {tbody.innerHTML = <tr><td colspan="5" class="text-center py-6 text-slate-400">ไม่พบข้อมูลตามเงื่อนไขที่เลือก</td></tr>;document.getElementById('adminTotalHours').innerText = 0.0 ชั่วโมง;return;}filteredLogs.forEach(log => {const tr = document.createElement('tr');tr.className = "border-b hover:bg-slate-50";const typeColor = log.type === 'Clock In' ? 'text-emerald-600 font-bold' : 'text-rose-600 font-bold';tr.innerHTML = <td class="py-2.5 px-3 font-medium text-slate-700">${log.dateStr}</td> <td class="py-2.5 px-3 font-semibold text-slate-900">${log.name}</td> <td class="py-2.5 px-3 ${typeColor}">${log.type}</td> <td class="py-2.5 px-3 font-mono">${log.timeStr}</td> <td class="py-2.5 px-3 text-slate-400">${log.distance} ม.</td>;tbody.appendChild(tr);});// 3. คำนวณหาจำนวนชั่วโมงทำงานรวมรายเดือนcalculateTotalWorkingHours(filteredLogs);}// ฟังก์ชันคำนวณจำนวนชั่วโมง (จับคู่ In กับ Out ของพนักงานแต่ละคนในวันเดียวกัน)function calculateTotalWorkingHours(filteredLogs) {// จัดกลุ่มข้อมูลตามชื่อพนักงาน และ ตามวันทำงานlet dailyGroups = {};// วนลูปจากหลังมาหน้าเพื่อให้เรียงตามเวลาจริง[...filteredLogs].reverse().forEach(log => {const key = ${log.name}_${log.dateStr};if (!dailyGroups[key]) {dailyGroups[key] = { inTime: null, outTime: null };}if (log.type === 'Clock In' && !dailyGroups[key].inTime) {dailyGroups[key].inTime = new Date(log.isoString);} else if (log.type === 'Clock Out') {dailyGroups[key].outTime = new Date(log.isoString);}});let totalMilliseconds = 0;// คำนวณส่วนต่างของแต่ละคู่ในแต่ละวันfor (let k in dailyGroups) {const group = dailyGroups[k];if (group.inTime && group.outTime && group.outTime > group.inTime) {totalMilliseconds += (group.outTime - group.inTime);}}// แปลงมิลลิวินาทีเป็นชั่วโมงทศนิยม 1 ตำแหน่งconst totalHours = totalMilliseconds / (1000 * 60 * 60);document.getElementById('adminTotalHours').innerText = ${totalHours.toFixed(1)} ชั่วโมง;}function clearLogs() {if (confirm('⚠️ แจ้งเตือน: คุณต้องการลบฐานข้อมูลเวลาทั้งหมดใช่หรือไม่? ข้อมูลจะไม่สามารถกู้คืนได้')) {localStorage.removeItem('attendance_logs_v2');renderAdminStats();}}
